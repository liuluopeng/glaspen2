[package]
name = "glaspen2"
version = "0.1.1"
edition = "2021"

[features]
default = ["cairo_real"]
cairo_real = []

[build-dependencies]
cc = "1"
pkg-config = "0.3"
vcpkg = "0.2"

[dependencies]
image = "0.25"
flate2 = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
ink-stroke-modeler-rs = "0.1"

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies.cairo-rs]
version = "0.20"

[target.'cfg(target_os = "windows")'.dependencies]
gtk = { package = "gtk4", version = "0.9" }
cairo-rs = "0.20"
